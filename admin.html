<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School of Medical Science - home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
    <link rel="shortcut icon" href="fav.png" type="image/x-icon">
</head>

<body>
    <section class="container-lg welcomeDiv">
        <div class="row">
            <h1 class="text-center my-5">Good Morning, Admin</h1>
        </div>
    </section>

    <main>
        <section class="container-lg management-section d-flex flex-column justify-content-center align-items-center">
            <div class="row d-flex justify-content-center align-items-center my-3">
                <div class="col-6">
                    <a href="#" class="btn w-100 p-3">Student <br> Management</a>
                </div>
                <div class="col-6">
                    <a href="#" class="btn w-100 p-3">Faculty <br> Management</a>
                </div>
            </div>
            <div class="row d-flex justify-content-center align-items-center my-3">
                <div class="col-6">
                    <a href="#" class="btn w-100 p-3">Event <br> Management</a>
                </div>
                <div class="col-6">
                    <a href="#" class="btn w-100 p-3">Course <br> Management</a>
                </div>
            </div>

        </section>

        <section class="container-lg total-section">

            <div class="total-div row text-center">

                <div class="col-4">
                    <div class="total-card">
                        <h5>Total Students</h5>
                        <h3 id="totalStudents">0</h3>
                    </div>
                </div>

                <div class="col-4">
                    <div class="total-card">
                        <h5>Total Faculty</h5>
                        <h3 id="totalFaculty">0</h3>
                    </div>
                </div>

                <div class="col-4">
                    <div class="total-card">
                        <h5>Total Courses</h5>
                        <h3 id="totalCourses">0</h3>
                    </div>
                </div>

            </div>

        </section>

        <section class="container-lg assessment-section">
            <div class="row">
                <h2>Academic Calendar</h2>
            </div>
            <div class="row d-flex justify-content-center align-items-center">
                <div id="calendar">

                </div>
            </div>
        </section>

        <section class="container-lg events-section">
            <div class="container-lg events-div p-3">
                <div class="row">
                    <h2>Events</h2>
                </div>
                <div id="eventsContainer" class="events-list"></div>
            </div>
        </section>


        <section class="container-lg menu-bar">
            <div class="row">
                <a href="notification.html" class="col-3" title="notification">
                    <div class="items-card">
                        <i class="fa-solid fa-bell fs-5 fw-bold"></i>
                    </div>
                </a>
                <a href="facultyProfile.html" class="col-3" title="profile">
                    <div class="items-card">
                        <i class="fa-solid fa-circle-user fs-5 fw-bold"></i>
                    </div>
                </a>
                <a href="faculty.html" class="col-3" title="home">
                    <div class="items-card">
                        <i class="fa-solid fa-house fs-5 fw-bold"></i>
                    </div>
                </a>
                <div id="settingsOverlay" class="settings-overlay">
                    <div class="d-flex flex-column justify-content-center align-items-end">
                        <a href="#" class="setting-item" title="Help & Support">
                            <div class=" text-end d-inline w-auto"><i class="fa-solid fa-gears"></i> Help & Support
                            </div>
                        </a>
                        <a href="index.html" class="setting-item" title="Logout">
                            <div class=" text-end d-inline w-auto"> <i class="fa-solid fa-right-from-bracket"></i>Logout
                            </div>
                        </a>
                        <a href="#" class="setting-item" title="about">
                            <div class=" text-end d-inline w-auto"><i class="fa-solid fa-circle-info"></i> About</div>
                        </a>
                    </div>
                </div>
                <a class="col-3" title="settings">
                    <div class="items-card">
                        <i id="settingsBtn" class="fa-solid fa-gear fs-5 fw-bold"></i>
                    </div>
                </a>

            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <!-- Itearation -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            var calendarEl = document.getElementById('calendar');

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',

                events: [
                    {
                        title: 'Assignment Submission',
                        start: '2026-04-24'
                    },
                    {
                        title: 'Histology Test',
                        start: '2026-04-26'
                    },
                    {
                        title: 'Periodontology Viva',
                        start: '2026-04-30'
                    }
                ]

            });

            calendar.render();

        });

        // redirect to login if not logged in
        /* protect page
        if (!localStorage.getItem("userId")) {
            window.location.href = "index.html"
        } */

        // load admin totals function added by Himesh Roy
        async function loadAdminTotals() {

            const response = await fetch(
                "https://erp-y6ur.onrender.com/admin/totals"
            )

            const data = await response.json()

            document.getElementById("totalStudents").innerText = data.students
            document.getElementById("totalFaculty").innerText = data.faculty
            document.getElementById("totalCourses").innerText = data.courses

        }

        // load events function added by Himesh Roy
        async function loadEvents() {

            const response = await fetch(
                "https://erp-y6ur.onrender.com/events"
            )

            const data = await response.json()

            const container = document.getElementById("eventsContainer")

            container.innerHTML = ""

            if (data.events.length === 0) {

                container.innerHTML = `
            <div class="event-card text-center">
            No events
            </div>
            `

                return
            }

            data.events.forEach(e => {

                const div = document.createElement("div")

                div.className = "event-card"

                div.innerHTML = `
                    <div>
                    <strong>${e.title}</strong><br>
                    <small>${e.time}</small>
                    </div>

                    <div>
            📍 ${e.place}
                    </div>
                `

                container.appendChild(div)

            })

        }

        loadEvents() // function call for events added by Himesh Roy

        loadAdminTotals() // function call for admin totals added by Himesh Roy



        /* js for settings function*/

        const settingsBtn = document.getElementById("settingsBtn");
        const overlay = document.getElementById("settingsOverlay");

        settingsBtn.addEventListener("click", function () {

            if (overlay.style.display === "block") {
                overlay.style.display = "none";
            }
            else {
                overlay.style.display = "block";
            }

        });

    </script>

</body>

</html>
