<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School of Medical Science</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
    <link rel="shortcut icon" href="fav.png" type="image/x-icon">
</head>

<body>
    <section class="container-lg welcomeDiv">
        <div class="row">
            <h1 class="text-center my-5">Login</h1>
        </div>
    </section>

    <main>
        <section class=" container-lg login-form">
            <div class="row">
                <div class="mb-3">
                    <label for="userid" class="form-label"><h5>User ID</h5></label>
                    <input type="text" class="form-control" id="userid"
                        placeholder="Enter your user ID">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label"><h5>Password</h5></label>
                    <input type="password" class="form-control" id="password"
                        placeholder="Enter your password">
                </div>
            </div>
            <div class="row">
                <div class="col-6 text-start">
                    <label for="rememberMe">
                <input type="checkbox" id="rememberMe" title="remember me"> Remember Me</label>
                </div>
                <div class="col-6 text-end">
                    <a href="#">forgot password?</a>
                </div>
            </div>
            <div class="row d-flex justify-content-center align-items-center my-4">
                <a href="home.html"class="btn login w-75" id="login" onclick="">Login</a>
            </div>
            <div class="row d-flex flex-column justify-content-center align-items-center my-3">
                <p class="text-secondary text-center mt-4">SUPPORT ACCESS</p>
                <a href="#" class=" text-decoration-none text-dark help-btn w-auto p-2"><i class="fa-regular fa-circle-question text-success"></i> CONTACT IT HELPDESK</a>
            </div>

        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
