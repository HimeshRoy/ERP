<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Fee Payment App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="payment.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
  <link rel="shortcut icon" href="fav.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.469.0/font/lucide.min.css" />
</head>

<body>
  <section class="container-lg welcomeDiv">
    <div class="row">
      <h1 id="welcomeName" class="text-center my-5"></h1>
      <!-- greeting has made dynamic by Himesh Roy-->
    </div>
  </section>

  <main>
    <!-- Total Due Card -->
    <section class="due-section container-lg">
      <div class="">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h2 class="">Total Due: ₹11,000</h2>
        </div>
        <div class="d-flex align-items-center justify-content-between gap-2 mt-1">
          <p class="d-flex align-items-center jusfiy-content-center">Due date: 30 April 2026</p>
          <p
            class=" text-uppercase bg-danger p-1 px-2 rounded-5 text-center fst-normal text-white font-medium d-inline-block">
            Pending
          </p>
        </div>
      </div>
    </section>
    <!-- Fee Breakdown -->
    <section class="fee-breakdown container-lg">
      <h3 class="py-2">Fee Breakdown</h3>
      <div class="fee-div">
        <div class="row my-2">
          <div class="col-4 text-start">
            <span class="text-lg font-medium">Tuition Fee</span>
          </div>
          <div class="col-4 text-center">
            <span class="text-lg fw-bold">₹10,000</span>
          </div>
          <div class="col-4 text-end">
            <span class="text-danger text-end">Due</span>
          </div>
        </div>
        <div class="row my-2">
          <div class="col-4 text-start">
            <span class="text-lg font-medium">Exam Fee</span>
          </div>
          <div class="col-4 text-center">
            <span class="text-lg fw-bold">₹500</span>
          </div>
          <div class="col-4 text-end">
            <span class="text-success text-end">Paid</span>
          </div>
        </div>
        <div class="row my-2">
          <div class="col-4 text-start">
            <span class="text-lg font-medium">Library Fee</span>
          </div>
          <div class="col-4 text-center">
            <span class="text-lg fw-bold">₹500</span>
          </div>
          <div class="col-4 text-end">
            <span class="text-danger text-end">Due</span>
          </div>
        </div>
      </div>
    </section>

    <section class="payment-section container-lg">
      <div class="row d-flex justify-content-center align-items-center my-3">
        <button class="w-75 btn" id="pay-now-button">
          Pay Now ₹11,000
        </button>
      </div>

      <!-- Payment History -->
      <section class="payment-history-section container-lg pt-4" id="payment-history-section">
        <h3>Payment History</h3>
        <div class="row p-3 d-flex">
          <div>
            <span class="text-lg fw-medium ">Semester 5 Fee</span>
            <span class="text-xl fw-medium">₹11,000</span>
          </div>
          <div class="text-right">
            <span class="text-success font-medium">Paid</span>
            <span class="text-secondary font-normal">15 Jan 2026</span>
          </div>
        </div>
        <div class="row p-3 d-flex">
          <div>
            <span class="text-lg fw-medium">Semester 4 Fee</span>
            <span class="text-xl fw-medium">₹11,000</span>
          </div>
          <div class="text-right">
            <span class="text-success font-medium">Paid</span>
            <span class="text-secondary font-normal">20 Jul 2025</span>
          </div>
        </div>
      </section>
    </section>

    <section class="container-lg menu-bar">
      <div class="row">
        <a href="notification.html" class="col-3" title="notification">
          <div class="items-card">
            <i class="fa-solid fa-bell fs-5 fw-bold"></i>
          </div>
        </a>
        <a href="profile.html" class="col-3" title="profile">
          <div class="items-card">
            <i class="fa-solid fa-circle-user fs-5 fw-bold"></i>
          </div>
        </a>
        <a href="home.html" class="col-3" title="home">
          <div class="items-card">
            <i class="fa-solid fa-house fs-5 fw-bold"></i>
          </div>
        </a>
        <div id="settingsOverlay" class="settings-overlay">
          <div class="d-flex flex-column justify-content-center align-items-end">
            <a href="#" class="setting-item" title="Help & Support">
              <div class=" text-end d-inline w-auto"><i class="fa-solid fa-gears"></i> Help & Support</div>
            </a>
            <a href="index.html" class="setting-item" title="Logout">
              <div class=" text-end d-inline w-auto"> <i class="fa-solid fa-right-from-bracket"></i>Logout</div>
            </a>
            <a href="#" class="setting-item" title="about">
              <div class=" text-end d-inline w-auto"><i class="fa-solid fa-circle-info"></i> About</div>
            </a>
          </div>
        </div>
        <a class="col-3" title="settings">
          <div class="items-card">
            <i id="settingsBtn" class="fa-solid fa-gear fs-5 fw-bold"></i>
          </div>
        </a>

      </div>
    </section>


  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>

    // redirect to login if not logged in
    // protect page
    if (!localStorage.getItem("userId")) {
      window.location.href = "index.html"
    }

    // greeting function
    function getGreeting() {

      const hour = new Date().getHours()

      if (hour >= 5 && hour < 12) {
        return "Good Morning"
      }
      else if (hour >= 12 && hour < 17) {
        return "Good Afternoon"
      }
      else if (hour >= 17 && hour < 21) {
        return "Good Evening"
      }
      else {
        return "Good Night"
      }

    }

    // get stored user
    const userName = localStorage.getItem("userName")

    const greeting = getGreeting()

    document.getElementById("welcomeName").innerText =
      `${greeting}, ${userName}`

    /* Greeting and redirect added by Himesh Roy*/

    /* js for settings function*/
    const settingsBtn = document.getElementById("settingsBtn");
    const overlay = document.getElementById("settingsOverlay");

    settingsBtn.addEventListener("click", function () {

      if (overlay.style.display === "block") {
        overlay.style.display = "none";
      }
      else {
        overlay.style.display = "block";
      }

    });
  </script>


</body>

</html>
