<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Sumon</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
    <link rel="shortcut icon" href="fav.png" type="image/x-icon">
</head>

<body>
    <section class="container-lg welcomeDiv">
        <div class="row">
            <h1 id="profileGreeting" class="text-center my-5"></h1>
            <!-- greeting has made dynamic by Himesh Roy-->
        </div>
    </section>

    <main>
        <section class="notification-section hero-section">
            <div class="row d-flex justify-content-center align-items-center">
                <div class="col-4 d-flex justify-content-center align-items-center">
                    <img src="https://cdn.pixabay.com/photo/2023/02/18/11/00/icon-7797704_640.png" alt=""
                        class="rounded-circle" width="100%">
                </div>
                <div class="col-8 d-flex flex-column justify-content-center">
                    <h4 id="studentName"></h4>
                    <p>Roll no.: <span id="rollNo"></span><br>
                        <span>Bachelor of Dental Surgery</span>
                    </p>
                </div>
            </div>
            <div class="row my-5 text-center d-flex justify-content-center align-items-center">
                <a href="#" class="btn w-75 rounded-3">View Result</a>
            </div>
        </section>

        <section class="container-lg details-section ">
            <div class="row d-flex justify-content-center align-items-center p-3">
                <div class="details-div p-3">
                    <p class="my-3"><span class="fs-6 fw-medium">Email Id :</span> <span id="email"
                            class="text-secondary"></span></p>

                    <p class="w-auto">
                        <span class="fs-6 fw-medium">Father Name :</span> <span id="fatherName"
                            class="text-secondary"></span> <br>
                        <span class="fs-6 fw-medium">Mother Name :</span> <span id="motherName"
                            class="text-secondary"></span>
                    </p>
                    <p class="w-auto">
                        <span class="fs-6 fw-medium">Date of Birth :</span> <span id="dob"
                            class=" text-secondary"></span>
                    </p>
                    <p class="w-auto">
                        <span class="fs-6 fw-medium">Mobile No. : </span> <span id="mobile"></span>
                    </p>
                    <p class="w-auto">
                        <span class="fs-6 fw-medium">Admission year : </span> <span id="year"
                            class="text-secondary"></span>
                    </p>
                    <p class="w-auto">
                        <span class="fs-6 fw-medium">Address : </span> <span id="address"
                            class=" text-secondary"></span>
                    </p>
                </div>
            </div>

            <div class="row d-flex flex-column justify-content-center align-items-center">
                <a href="#" class="btn w-75 rounded-3 my-3">Qualification</a>
                <a href="#" class="btn w-75 rounded-3 my-3">Document Submitted</a>
            </div>
        </section>

        <section class="container-lg menu-bar">
            <div class="row">
                <a href="notification.html" class="col-3" title="notification">
                    <div class="items-card">
                        <i class="fa-solid fa-bell fs-5 fw-bold"></i>
                    </div>
                </a>
                <a href="profile.html" class="col-3" title="profile">
                    <div class="items-card">
                        <i class="fa-solid fa-circle-user fs-5 fw-bold"></i>
                    </div>
                </a>
                <a href="home.html" class="col-3" title="home">
                    <div class="items-card">
                        <i class="fa-solid fa-house fs-5 fw-bold"></i>
                    </div>
                </a>
                <div id="settingsOverlay" class="settings-overlay">
                    <div class="d-flex flex-column justify-content-center align-items-end">
                        <a href="#" class="setting-item" title="Help & Support">
                            <div class=" text-end d-inline w-auto"><i class="fa-solid fa-gears"></i> Help & Support
                            </div>
                        </a>
                        <a href="index.html" class="setting-item" title="Logout">
                            <div class=" text-end d-inline w-auto"> <i class="fa-solid fa-right-from-bracket"></i>Logout
                            </div>
                        </a>
                        <a href="#" class="setting-item" title="about">
                            <div class=" text-end d-inline w-auto"><i class="fa-solid fa-circle-info"></i> About</div>
                        </a>
                    </div>
                </div>
                <a class="col-3" title="settings">
                    <div class="items-card">
                        <i id="settingsBtn" class="fa-solid fa-gear fs-5 fw-bold"></i>
                    </div>
                </a>

            </div>
        </section>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // redirect to login if not logged in
        // protect page
        if (!localStorage.getItem("userId")) {
            window.location.href = "index.html"
        }

        
        // greeting function
        const userName = localStorage.getItem("userName") || "Student"

        document.getElementById("profileGreeting").innerText =
            `Welcome ${userName}`

        //profile details load function 
        async function loadProfile() {

            const userId = localStorage.getItem("userId")

            const response = await fetch(
                `https://erp-y6ur.onrender.com/student/profile/${userId}`
            )

            const data = await response.json()

            document.getElementById("studentName").innerText = data.name
            document.getElementById("rollNo").innerText = data.roll_no
            document.getElementById("email").innerText = data.email

            document.getElementById("fatherName").innerText = data.father_name
            document.getElementById("motherName").innerText = data.mother_name
            document.getElementById("dob").innerText = data.dob
            document.getElementById("mobile").innerText = data.mobile
            document.getElementById("year").innerText = data.year
            document.getElementById("address").innerText = data.address

        }

        /* js for settings function*/
        const settingsBtn = document.getElementById("settingsBtn");
        const overlay = document.getElementById("settingsOverlay");

        settingsBtn.addEventListener("click", function () {

            if (overlay.style.display === "block") {
                overlay.style.display = "none";
            }
            else {
                overlay.style.display = "block";
            }

        });

        loadProfile(); // function call for profile details load added by Himesh Roy

    </script>

</body>

</html>
