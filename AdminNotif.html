<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="notification.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="AdminNotif.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
    <link rel="shortcut icon" href="fav.png" type="image/x-icon">
</head>

<body>
    <section class="container-lg welcomeDiv">
        <div class="row">
            <h1 class="text-center my-5"><i class="fa-solid fa-bell"></i> Notification</h1>
        </div>
    </section>

    <main>
        <section class="container-lg" id="adminPanel">
            <div class="card p-3">
                <h5>Add Notification</h5>

                <input type="text" id="title" class="form-control my-2" placeholder="Title">

                <textarea id="message" class="form-control my-2" placeholder="Message"></textarea>

                <button class="btn mt-2" onclick="addNotification()">Add</button>
            </div>
        </section>
        <section class="notification-section container-lg">

            <div id="notificationContainer"></div>

        </section>


        <section class="container-lg menu-bar">
            <div class="row">
                <a href="notification.html" class="col-3" title="notification">
                    <div class="items-card">
                        <i class="fa-solid fa-bell fs-5 fw-bold"></i>
                    </div>
                </a>
                <a href="adminProfile.html" class="col-3" title="profile">
                    <div class="items-card">
                        <i class="fa-solid fa-circle-user fs-5 fw-bold"></i>
                    </div>
                </a>
                <a href="admin.html" class="col-3" title="home">
                    <div class="items-card">
                        <i class="fa-solid fa-house fs-5 fw-bold"></i>
                    </div>
                </a>
                <div id="settingsOverlay" class="settings-overlay">
                    <div class="d-flex flex-column justify-content-center align-items-end">
                        <a href="#" class="setting-item" title="Help & Support">
                            <div class=" text-end d-inline w-auto"><i class="fa-solid fa-gears"></i> Help & Support
                            </div>
                        </a>
                        <a href="index.html" class="setting-item" title="Logout">
                            <div class=" text-end d-inline w-auto"> <i class="fa-solid fa-right-from-bracket"></i>Logout
                            </div>
                        </a>
                        <a href="#" class="setting-item" title="about">
                            <div class=" text-end d-inline w-auto"><i class="fa-solid fa-circle-info"></i> About
                            </div>
                        </a>
                    </div>
                </div>
                <a class="col-3" title="settings">
                    <div class="items-card">
                        <i id="settingsBtn" class="fa-solid fa-gear fs-5 fw-bold"></i>
                    </div>
                </a>

            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        // loadNotifications function added by Himesh Roy
        async function loadNotifications() {

            const response = await fetch(
                "https://erp-y6ur.onrender.com/notifications"
            )

            const data = await response.json()

            const container = document.getElementById("notificationContainer")

            container.innerHTML = ""

            if (data.notifications.length === 0) {

                container.innerHTML = `
<div class="notification-card text-center">
No notifications
</div>
`

                return
            }

            data.notifications.forEach(n => {

                const div = document.createElement("div")

                div.className = "notification-card"

                div.innerHTML = `
<strong>${n.title}</strong>
<br>
<small>${n.message}</small>
<br>
<span style="font-size:12px;color:gray">
${n.date}
</span>
`

                container.appendChild(div)

            })

        }


        /* js for settings function*/
        const settingsBtn = document.getElementById("settingsBtn");
        const overlay = document.getElementById("settingsOverlay");

        settingsBtn.addEventListener("click", function () {

            if (overlay.style.display === "block") {
                overlay.style.display = "none";
            }
            else {
                overlay.style.display = "block";
            }

        });

        loadNotifications() // function call for notifications added by Himesh Roy

        async function addNotification() {

            const title = document.getElementById("title").value
            const message = document.getElementById("message").value

            if (!title || !message) {
                alert("Fill all fields")
                return
            }

            const response = await fetch("https://erp-y6ur.onrender.com/notifications", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ title, message })
            })

            if (response.ok) {
                alert("Notification added")
                loadNotifications()
            } else {
                alert("Error adding notification")
            }
        }

    </script>


</body>

</html>
